<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antes y Después - Memory Game</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #111;
  color: white;
  text-align: center;
}

h1 {
  margin: 15px;
  font-size: 1.4rem;
}

#game {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 10px;
}

.card {
  aspect-ratio: 1;
  background: #333;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

.card.flipped img {
  display: block;
}

.card::after {
  content: "❓";
  position: absolute;
  font-size: 2rem;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card.flipped::after {
  display: none;
}

#stats {
  margin: 10px;
  font-size: 0.9rem;
}
</style>
</head>

<body>

<h1>🧠 Antes y Después</h1>
<div id="stats">Movimientos: 0</div>
<div id="game"></div>

<script>
// 👉 PASTE YOUR IMAGES HERE
const images = [
  "https://via.placeholder.com/300?text=1",
  "https://via.placeholder.com/300?text=2",
  "https://via.placeholder.com/300?text=3",
  "https://via.placeholder.com/300?text=4",
  "https://via.placeholder.com/300?text=5",
  "https://via.placeholder.com/300?text=6"
];

// duplicate & shuffle
let cards = [...images, ...images]
  .sort(() => Math.random() - 0.5);

const game = document.getElementById("game");

let first = null;
let lock = false;
let moves = 0;

cards.forEach(src => {
  const card = document.createElement("div");
  card.className = "card";

  const img = document.createElement("img");
  img.src = src;

  card.appendChild(img);

  card.onclick = () => {
    if (lock || card.classList.contains("flipped")) return;

    card.classList.add("flipped");

    if (!first) {
      first = card;
      return;
    }

    moves++;
    document.getElementById("stats").innerText = "Movimientos: " + moves;

    if (first.querySelector("img").src === img.src) {
      first = null;
    } else {
      lock = true;
      setTimeout(() => {
        card.classList.remove("flipped");
        first.classList.remove("flipped");
        first = null;
        lock = false;
      }, 700);
    }
  };

  game.appendChild(card);
});
</script>

</body>
</html>
